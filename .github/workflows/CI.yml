name: CGV_CD
on:
  push:
    branches:
      - main
      - kimdoes

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cgvdb
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build with Gradle Wrapper
        run: ./gradlew build --stacktrace --info
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/cgvdb?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
          DB_USERNAME: root
          DB_PASSWORD: root

          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

          CONCURRENCY_ID: ${{ secrets.CONCURRENCY_ID }}
          CONCURRENCY_SECRET_KEY: ${{ secrets.CONCURRENCY_SECRET_KEY }}