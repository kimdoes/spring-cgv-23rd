name: CGV CD
on:
  workflow_run:
    workflows: ["CGV_CI"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (
          github.event.workflow_run.head_branch == 'main' || 
          github.event.workflow_run.head_branch == 'kimdoes'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setting Buildx Docker
        uses: docker/setup-buildx-action@v3

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64, linux/arm64
          tags: |
            kdhyun422/my-app:latest
            kdhyun422/my-app:${{ github.event.workflow_run.head_sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
            
            cat > .env <<EOF
            IMAGE_TAG=$IMAGE_TAG
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            EOF
            
            sudo docker compose pull
            sudo docker compose up -d
            
            for i in {1..10}; do
              if curl -f http://localhost:80/health/ready; then
                echo "Health Check passed"
                break
              fi
              echo "Waiting for Service..."
              sleep 2
            done
            
            curl -f http://localhost:80/health/ready || exit 1
            
            sudo docker image prune -f