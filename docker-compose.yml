services:
  app:
    image: kdhyun422/my-app:${IMAGE_TAG}
    ports:
      - "80:8080"
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - SPRING_PROFILES_ACTIVE=prod

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ready" ]
      interval: 10s
      timeout: 3s
      retries: 5